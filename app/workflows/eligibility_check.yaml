family: eligibility_check

trigger_hints:
  - իրավունք ունեմ
  - իրավունք ունե՞մ
  - ընդգրկվա՞ծ եմ
  - ինձ հասնու՞մ է
  - կարո՞ղ եմ օգտվել
  - թոշակառու
  - 65
  - հղի
  - երեխա
  - հաշմանդամ
  - սոցիալապես անապահով
  - աշխատող
  - ապահովագրված
  - eligible
  - eligibility

required_fields:
  - person_group

field_questions:
  person_group: "Գրե՛ք՝ խոսքը որ կարգավիճակի մասին է՝ 65+, թոշակառու, հաշմանդամություն, հղիություն, երեխա, սոցիալապես անապահով, թե աշխատող/ապահովագրված։"

field_priority:
  - person_group

branches:
  - id: elderly_65_plus
    when:
      person_group: elderly_65_plus
    answer: "65+ կարգավիճակը կարող է նշանակություն ունենալ որոշ պետական առողջապահական ծրագրերում, բայց վերջնական իրավունքը կախված է կոնկրետ ծառայությունից կամ ծրագրից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք այդ ծառայության պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: pensioner
    when:
      person_group: pensioner
    answer: "Թոշակառու կարգավիճակը կարող է նշանակություն ունենալ որոշ պետական ծրագրերում, բայց վերջնական իրավունքը կախված է կոնկրետ ծառայությունից կամ ծրագրից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: disability
    when:
      person_group: disability
    answer: "Հաշմանդամության կարգավիճակը կարող է նշանակություն ունենալ որոշ պետական ծառայությունների կամ արտոնությունների դեպքում, բայց վերջնական իրավունքը կախված է կոնկրետ ծրագրից կամ ծառայությունից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: pregnancy
    when:
      person_group: pregnancy
    answer: "Հղիության կարգավիճակը կարող է նշանակություն ունենալ մայրական և որոշ առողջապահական ծրագրերի դեպքում, բայց վերջնական իրավունքը կախված է կոնկրետ ծառայությունից կամ ծրագրից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: child
    when:
      person_group: child
    answer: "Երեխայի կարգավիճակը կարող է նշանակություն ունենալ որոշ պետական առողջապահական ծառայությունների դեպքում, բայց վերջնական իրավունքը կախված է կոնկրետ ծառայությունից կամ ծրագրից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: social_vulnerability
    when:
      person_group: social_vulnerability
    answer: "Սոցիալապես անապահով կարգավիճակը կարող է նշանակություն ունենալ որոշ պետական ծրագրերում, բայց վերջնական իրավունքը կախված է կոնկրետ ծառայությունից կամ ծրագրից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: worker_insured
    when:
      person_group: worker_insured
    answer: "Աշխատող կամ ապահովագրված կարգավիճակը կարող է նշանակություն ունենալ որոշ առողջապահական ծրագրերի դեպքում, բայց վերջնական իրավունքը կախված է կոնկրետ ծառայությունից կամ ծրագրից։"
    next_step: "Ճշտեք կոնկրետ որ ծառայության կամ ծրագրի մասին է խոսքը, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

