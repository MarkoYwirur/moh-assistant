family: service_coverage_check

trigger_hints:
  - ծածկվո՞ւմ է
  - ծածկվում է
  - անվճար է
  - վճարովի է
  - մռտ
  - կտ
  - հոսպիտալացում
  - լաբորատոր
  - անալիզ
  - մասնագետ
  - վիրահատ
  - coverage
  - covered

required_fields:
  - service_type

field_questions:
  service_type: "Գրե՛ք՝ որ ծառայության մասին է խոսքը՝ ՄՌՏ, ԿՏ, հոսպիտալացում, լաբորատոր քննություն, մասնագետ, թե վիրահատություն։"

field_priority:
  - service_type

branches:
  - id: mri
    when:
      service_type: mri
    answer: "ՄՌՏ-ի ծածկույթը կարող է կախված լինել ուղեգրից, կիրառվող պայմաններից և ծրագրային հիմքից, այնպես որ վերջնական պատասխանը միայն «այո/ոչ» ձևով ճիշտ չի լինի։"
    next_step: "Ճշտեք՝ ունե՞ք ուղեգիր և կոնկրետ ինչ հիմքով է նշանակվել ՄՌՏ-ն, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: ct
    when:
      service_type: ct
    answer: "ԿՏ-ի ծածկույթը կարող է կախված լինել ուղեգրից, կիրառվող պայմաններից և ծրագրային հիմքից, այնպես որ վերջնական պատասխանը միայն «այո/ոչ» ձևով ճիշտ չի լինի։"
    next_step: "Ճշտեք՝ ունե՞ք ուղեգիր և կոնկրետ ինչ հիմքով է նշանակվել ԿՏ-ն, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: hospitalization
    when:
      service_type: hospitalization
    answer: "Հոսպիտալացման ծածկույթը կախված է նրանից՝ դեպքը շտապ է, թե պլանային, և ինչ հիմքով է ընդունումը կատարվում։"
    next_step: "Ճշտեք՝ խոսքը շտապ, թե պլանային հոսպիտալացման մասին է, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: lab
    when:
      service_type: lab
    answer: "Լաբորատոր քննությունների ծածկույթը կարող է կախված լինել նրանից՝ դրանք նշանակված են համապատասխան հիմքով, թե ոչ։"
    next_step: "Ճշտեք՝ կոնկրետ որ քննության մասին է խոսքը և ինչ հիմքով է այն նշանակվել, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: specialist
    when:
      service_type: specialist
    answer: "Մասնագետի դիմելու կամ ծառայության ծածկույթը հաճախ կախված է նրանից՝ ունե՞ք ուղեգիր, թե ոչ, և ինչ կարգով եք դիմում։"
    next_step: "Ճշտեք՝ որ մասնագետի մասին է խոսքը և ունե՞ք ուղեգիր, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

  - id: surgery
    when:
      service_type: surgery
    answer: "Վիրահատության ծածկույթը կախված է վիրահատության տեսակից, բժշկական հիմքից և կիրառվող ծրագրային կարգից։"
    next_step: "Ճշտեք՝ կոնկրետ որ վիրահատության մասին է խոսքը և ինչ հիմքով է այն նշանակվել, հետո ստուգեք պայմանները համապատասխան պաշտոնական աղբյուրով կամ թեժ գծով։"

source_preferences:
  - hotline_8003
  - moh_faq_section
